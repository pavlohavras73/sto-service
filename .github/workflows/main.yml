name: STO Service CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

env:
  APP_VERSION: "1.0.0"

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Print APP_VERSION
        run: echo "APP_VERSION=${{ env.APP_VERSION }}"

      - name: Run unit tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push sto-service Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sto-service:${{ env.APP_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sto-service:latest

      - name: Build and Push sto-migration Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: migration/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sto-migration:${{ env.APP_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sto-migration:latest
